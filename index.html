    <title>Pictet Group | Wealth & Asset Management</title>
    <script>
      function loadOptimizely() {
        if (document.querySelector('script[src*="cdn.optimizely.com"]')) return;
        var script = document.createElement("script");
        script.onload = function () {
          window["optimizely"] = window["optimizely"] || [];
          window["optimizely"].push({ type: "activate" });
        };
        document.head.appendChild(script);
      }
      if (document.cookie.indexOf("pictet_cookie_consent=all") !== -1) {
        loadOptimizely();
      }
    </script>
